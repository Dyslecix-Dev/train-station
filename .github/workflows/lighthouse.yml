name: Lighthouse CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  lighthouse:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build production site
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-key
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          POSTGRES_URL: postgresql://test:test@localhost/test
          POSTGRES_URL_NON_POOLING: postgresql://test:test@localhost/test
      - name: Collect Lighthouse reports
        run: pnpm exec lhci collect
        env:
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-key
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          POSTGRES_URL: postgresql://test:test@localhost/test
          POSTGRES_URL_NON_POOLING: postgresql://test:test@localhost/test
      - name: Assert Lighthouse thresholds
        run: pnpm exec lhci assert
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
      - name: Upload Lighthouse reports
        run: pnpm exec lhci upload
