name: Update Visual Snapshots
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update snapshots on"
        required: false
        default: ""
jobs:
  update-snapshots:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Update snapshots
        run: pnpm exec playwright test --project=visual --update-snapshots
        env:
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-key
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          POSTGRES_URL: postgresql://test:test@localhost/test
          POSTGRES_URL_NON_POOLING: postgresql://test:test@localhost/test
          AUTH_RATE_LIMIT: "500"
      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual.spec.ts-snapshots/
          git diff --cached --quiet || git commit -m "chore: update visual regression snapshots"
          git push
